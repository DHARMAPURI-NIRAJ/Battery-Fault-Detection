{% extends "base.html" %}

{% block content %}

<h3>Manage Users</h3>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>


{% for u in users %}
<tr>
<td>{{ u.id }}</td>
<td>{{ u.name }}</td>
<td>{{ u.email }}</td>
<td>{{ u.phone }}</td>
<td>
	<a href="{{ url_for('delete_user', uid=u.id) }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
